<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        width: 700px;
        height: 600px;
        background-color: beige;
      }
      .square {
        width: 100px;
        height: 100px;
        /* background-color: red; */
        margin: 10px;
        display: inline-block;
      }
      .rectangle {
        width: 150px;
        height: 100px;
        /* background-color: blue; */
        margin: 10px;
        display: inline-block;
      }
      .circle {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        /* background-color: red; */
        margin: 10px;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <input id="shapeInput" type="text" placeholder="enter any number" />
    <input type="color" name="" id="shapeColor" placeholder="color of shape" />
    <input type="text" name="" id="shapeName" placeholder="name of shape" />
    <button id="btn">Generate</button>

    <div class="container"></div>
    <script>
      const btn = document.querySelector("#btn");
      btn.addEventListener("click", () => {
        const shapeNumber = document.querySelector("#shapeInput").value;
        const shapeColor = document.querySelector("#shapeColor").value;
        const shapeName = document.querySelector("#shapeName").value;
        // console.log(shapeNumber, shapeColor, shapeName);

        for (let i = 0; i < shapeNumber; i++) {
          let shape = document.createElement("div");
          shape.classList.add(shapeName);
          shape.style.backgroundColor = shapeColor;

          document.querySelector(".container").appendChild(shape);
        }
      });
    </script>
  </body>
</html>
